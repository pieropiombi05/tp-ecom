<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WOMBOO — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="login-page">
    <h1>LOGIN</h1>
    <form class="login-form">
      <div class="form-group">
        <label>EMAIL</label>
        <input type="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>PASSWORD</label>
        <input type="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary">SIGN IN →</button>
    </form>
    <p>Don't have an account? <a href="register.html">Register</a></p>
    <p><a href="index.html">← Back to store</a></p>
  </main>
</body>
</html>
